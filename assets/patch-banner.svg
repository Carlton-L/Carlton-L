<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Carlton Lindsay, design engineer. A dataflow patch: DESIGNER and ENGINEER operators feed a build() node that outputs 'I build what I design'.">
  <title>Carlton Lindsay — Design Engineer</title>

  <defs>
    <!-- dot grid -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#161b17"/>
    </pattern>
    <!-- signal glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f6b45"/>
      <stop offset="1" stop-color="#3dff88"/>
    </linearGradient>

    <style><![CDATA[
      .mono   { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .disp   { font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .type   { fill:#3dff88; font-size:11px; letter-spacing:1.5px; }
      .name   { fill:#e8ede9; }
      .sub    { fill:#7d867f; }
      .cable  { fill:none; stroke:url(#edge); stroke-width:1.6; opacity:.55;
                stroke-dasharray:5 7; animation:flow 1.1s linear infinite; }
      .pulse  { fill:#3dff88; }
      .p1 { offset-path: path("M300,150 C372,150 372,198 448,198"); animation: run 1.8s linear infinite; }
      .p2 { offset-path: path("M300,262 C372,262 372,198 448,198"); animation: run 1.8s linear infinite .35s; }
      .p3 { offset-path: path("M632,198 C700,198 700,206 772,206"); animation: run 1.8s linear infinite .9s; }
      .blink { animation: blink 1.4s steps(1) infinite; }
      .outglow { animation: breathe 2.2s ease-in-out infinite; }
      @keyframes flow    { to { stroke-dashoffset:-24; } }
      @keyframes run     { 0%{offset-distance:0%;opacity:0} 12%{opacity:1} 88%{opacity:1} 100%{offset-distance:100%;opacity:0} }
      @keyframes blink   { 0%,50%{opacity:1} 51%,100%{opacity:.2} }
      @keyframes breathe { 0%,100%{opacity:.35} 50%{opacity:.9} }
      @media (prefers-reduced-motion: reduce){
        .cable{ animation:none; }
        .p1,.p2,.p3{ animation:none; offset-distance:55%; }
        .blink,.outglow{ animation:none; opacity:.8; }
      }
    ]]></style>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="360" fill="#0a0c0b"/>
  <rect width="1200" height="360" fill="url(#dots)"/>
  <rect x="0.5" y="0.5" width="1199" height="359" fill="none" stroke="#1c221e"/>

  <!-- ================= top bar ================= -->
  <g transform="translate(40,40)">
    <path d="M0,0 l8,8 l-8,8 l-8,-8 z" fill="#3dff88" filter="url(#glow)"/>
    <text x="22" y="12" class="disp name" font-size="20" font-weight="800" letter-spacing="1.5">CARLTON LINDSAY</text>
    <!-- role chip -->
    <g transform="translate(276,-4)">
      <rect x="0" y="0" width="146" height="22" rx="3" fill="#111412" stroke="#242a26"/>
      <text x="12" y="15" class="mono" fill="#9aa39b" font-size="11" letter-spacing="1">DESIGN ENGINEER</text>
    </g>
  </g>
  <!-- status, right -->
  <g transform="translate(1160,40)" text-anchor="end">
    <circle cx="-118" cy="7" r="4" class="pulse blink" filter="url(#glow)"/>
    <text x="-130" y="11" class="mono" fill="#7d867f" font-size="11" letter-spacing="1">NETWORK</text>
    <text x="0" y="11" class="mono" fill="#3dff88" font-size="11" letter-spacing="1">COOKING</text>
  </g>
  <line x1="40" y1="70" x2="1160" y2="70" stroke="#1c221e"/>

  <!-- ================= cables (behind nodes) ================= -->
  <path class="cable" d="M300,150 C372,150 372,198 448,198"/>
  <path class="cable" d="M300,262 C372,262 372,198 448,198"/>
  <path class="cable" d="M632,198 C700,198 700,206 772,206"/>
  <circle r="4" class="pulse p1" filter="url(#glow)"/>
  <circle r="4" class="pulse p2" filter="url(#glow)"/>
  <circle r="4" class="pulse p3" filter="url(#glow)"/>

  <!-- ================= operator: DESIGNER ================= -->
  <g transform="translate(70,118)">
    <rect x="0.5" y="0.5" width="230" height="64" rx="4" fill="#111412" stroke="#242a26"/>
    <rect x="0.5" y="0.5" width="230" height="20" rx="4" fill="#0e100f"/>
    <text x="12" y="15" class="mono type">TXT</text>
    <text x="218" y="15" text-anchor="end" class="mono sub" font-size="10">designer</text>
    <text x="14" y="46" class="disp name" font-size="24" font-weight="800">Designer</text>
    <text x="150" y="46" class="mono sub" font-size="12">who deploys</text>
    <circle cx="0" cy="32" r="3.5" fill="#3dff88"/>
    <circle cx="230" cy="32" r="3.5" fill="#3dff88"/>
  </g>

  <!-- ================= operator: ENGINEER ================= -->
  <g transform="translate(70,230)">
    <rect x="0.5" y="0.5" width="230" height="64" rx="4" fill="#111412" stroke="#242a26"/>
    <rect x="0.5" y="0.5" width="230" height="20" rx="4" fill="#0e100f"/>
    <text x="12" y="15" class="mono type">SYS</text>
    <text x="218" y="15" text-anchor="end" class="mono sub" font-size="10">engineer</text>
    <text x="14" y="46" class="disp name" font-size="24" font-weight="800">Engineer</text>
    <text x="150" y="46" class="mono sub" font-size="12">who dreams</text>
    <circle cx="0" cy="32" r="3.5" fill="#3dff88"/>
    <circle cx="230" cy="32" r="3.5" fill="#3dff88"/>
  </g>

  <!-- ================= operator: build() merge ================= -->
  <g transform="translate(448,166)">
    <rect x="0.5" y="0.5" width="184" height="64" rx="4" fill="#111412" stroke="#2c433a"/>
    <rect x="0.5" y="0.5" width="184" height="20" rx="4" fill="#0e100f"/>
    <text x="12" y="15" class="mono type">DATA</text>
    <text x="172" y="15" text-anchor="end" class="mono sub" font-size="10">merge</text>
    <text x="14" y="48" class="mono" fill="#e8ede9" font-size="20" font-weight="700">build()</text>
    <circle cx="0" cy="32" r="3.5" fill="#3dff88"/>
    <circle cx="184" cy="32" r="3.5" fill="#3dff88"/>
  </g>

  <!-- ================= operator: OUT / VIEW ================= -->
  <g transform="translate(772,150)">
    <rect x="0.5" y="0.5" width="356" height="96" rx="5" fill="#0f1512" stroke="#3dff88" opacity="1"/>
    <rect x="0.5" y="0.5" width="356" height="96" rx="5" fill="none" stroke="#3dff88" class="outglow" filter="url(#glow)"/>
    <rect x="0.5" y="0.5" width="356" height="22" rx="5" fill="#0c130f"/>
    <text x="14" y="16" class="mono type">OUT</text>
    <text x="342" y="16" text-anchor="end" class="mono sub" font-size="10">render</text>
    <text x="20" y="52" class="disp name" font-size="21" font-weight="800">I build</text>
    <text x="20" y="78" class="disp name" font-size="21" font-weight="800">what I <tspan fill="#3dff88">design.</tspan></text>
    <circle cx="0" cy="56" r="3.5" fill="#3dff88"/>
  </g>

  <!-- ================= footer tagline ================= -->
  <line x1="40" y1="322" x2="1160" y2="322" stroke="#1c221e"/>
  <text x="40" y="344" class="mono" fill="#5f675f" font-size="12" letter-spacing=".5">
    <tspan fill="#7d867f">$</tspan> selections re-cook the network<tspan fill="#3dff88" class="blink">_</tspan>
  </text>
  <text x="1160" y="344" text-anchor="end" class="mono" fill="#4a524b" font-size="11" letter-spacing="1">carlton.dev</text>
</svg>
